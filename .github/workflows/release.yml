name: Release Obsidian plugin

on:
  workflow_dispatch:

jobs:
  release:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"

      - run: yarn install --frozen-lockfile

      - name: Read version from manifest
        id: meta
        run: |
          echo "version=$(jq -r .version manifest.json)" >> "$GITHUB_OUTPUT"

      - name: Build plugin
        run: yarn build

      - name: Stage release assets
        run: |
          cp node_modules/@rollup/browser/dist/bindings_wasm_bg.wasm bindings_wasm_bg.wasm
          zip -qq "emera-${{ steps.meta.outputs.version }}.zip" \
            main.js manifest.json styles.css bindings_wasm_bg.wasm

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "${{ steps.meta.outputs.version }}"
          name: "${{ steps.meta.outputs.version }}"
          generate_release_notes: true
          files: |
            emera-${{ steps.meta.outputs.version }}.zip
            main.js
            manifest.json
            styles.css
            bindings_wasm_bg.wasm
